name: Stock Monitor Daily Update

on:
  schedule:
    - cron: '0 1 * * *' # 国际标准时间 1:00，等于北京时间早上 9:00
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install akshare pandas

      - name: 运行监控脚本
        run: python monitor.py

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # 发布根目录下的 index.html
